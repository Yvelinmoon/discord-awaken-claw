<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neta Universe · Flow Preview</title>
<style>
/* ── Reset ─────────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:         #313338;
  --bg-dark:    #2b2d31;
  --bg-darker:  #1e1f22;
  --bg-deepest: #0d1117;
  --text:       #dbdee1;
  --text-muted: #949ba4;
  --text-white: #f2f3f5;
  --blurple:    #5865f2;
  --green:      #248046;
  --embed-bg:   #2b2d31;
  --term-green: #3fb950;
  --term-bright:#7ee787;
  --term-gold:  #e3b341;
  --term-blue:  #79c0ff;
  --term-dim:   #21262d;
}
body{
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"gg sans","Noto Sans","Helvetica Neue",Arial,sans-serif;
  color:var(--text);
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* ── Scrollbar ──────────────────────────────────────────── */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1a1b1e;border-radius:4px}

/* ── Sidebar ────────────────────────────────────────────── */
.sidebar{
  width:240px;flex-shrink:0;
  background:var(--bg-dark);
  display:flex;flex-direction:column;
  user-select:none;
}
.server-header{
  height:48px;
  display:flex;align-items:center;
  padding:0 16px;
  font-weight:700;font-size:15px;color:var(--text-white);
  border-bottom:1px solid var(--bg-darker);
  cursor:pointer;
}
.server-header:hover{background:rgba(255,255,255,.04)}
.channel-section{padding:16px 8px 4px;font-size:11px;font-weight:700;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.02em;}
.channel{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:4px;
  font-size:15px;color:var(--text-muted);
  cursor:pointer;transition:background .1s,color .1s;
}
.channel:hover{background:rgba(255,255,255,.06);color:var(--text)}
.channel.active{background:#404249;color:var(--text-white);font-weight:500}
.channel-hash{font-size:18px;color:var(--text-muted);line-height:1}
.channel.active .channel-hash{color:var(--text-white)}
.sidebar-footer{
  margin-top:auto;height:52px;background:#232428;
  display:flex;align-items:center;padding:0 8px;gap:8px;
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--blurple);display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;
}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:600;color:var(--text-white);line-height:1.2}
.user-status{font-size:11px;color:var(--text-muted)}

/* ── Main ───────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-header{
  height:48px;flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  padding:0 16px;
  border-bottom:1px solid var(--bg-darker);
  font-weight:700;font-size:15px;color:var(--text-white);
}
.chat-header .hash{font-size:20px;color:var(--text-muted)}

/* ── Messages ───────────────────────────────────────────── */
.messages{
  flex:1;overflow-y:auto;
  padding:16px 0 24px;
  display:flex;flex-direction:column;
}
.msg{
  display:flex;gap:16px;
  padding:2px 16px;
  min-height:28px;
  transition:background .05s;
}
.msg:hover{background:rgba(0,0,0,.06)}
.msg.with-meta{padding-top:16px;margin-top:4px}
.avatar{
  width:40px;height:40px;border-radius:50%;
  flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;background:#5865f2;
  margin-top:2px;
}
.avatar img{width:100%;height:100%;object-fit:cover}
.no-avatar{width:40px;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-meta{
  display:flex;align-items:baseline;gap:8px;margin-bottom:4px;
}
.username{font-size:15px;font-weight:500;color:#c9cdfb;line-height:1.3}
.username.char-name{color:#faa61a}
.bot-badge{
  background:var(--blurple);color:#fff;
  font-size:10px;font-weight:600;
  padding:1px 5px;border-radius:3px;
  vertical-align:middle;letter-spacing:.02em;
}
.ts{font-size:11px;color:var(--text-muted);font-weight:400}
.msg-text{font-size:14px;line-height:1.5;color:var(--text)}
.msg-text em{font-style:italic;color:var(--text-muted)}
.msg-text strong{font-weight:600;color:var(--text-white)}

/* ── Embed ──────────────────────────────────────────────── */
.embed{
  margin-top:4px;max-width:516px;
  border-radius:4px;overflow:hidden;
  background:var(--embed-bg);
  border-left:4px solid #4f545c;
  display:flex;
}
.embed-inner{padding:12px 16px 16px;flex:1;min-width:0}
.embed-author{
  display:flex;align-items:center;gap:8px;
  margin-bottom:8px;font-size:12px;font-weight:600;color:var(--text);
}
.embed-author-icon{
  width:24px;height:24px;border-radius:50%;
  background:#faa61a;display:flex;align-items:center;
  justify-content:center;font-size:13px;
}
.embed-title{
  font-size:15px;font-weight:700;color:#fff;
  margin-bottom:8px;line-height:1.4;
}
.embed-desc{
  font-size:14px;color:var(--text);
  line-height:1.6;white-space:pre-wrap;
}
.embed-fields{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.embed-field{min-width:120px}
.embed-field.full{width:100%}
.embed-field-name{font-size:13px;font-weight:700;color:#fff;margin-bottom:2px}
.embed-field-val{font-size:13px;color:var(--text);line-height:1.4}
.embed-footer{
  display:flex;align-items:center;gap:6px;
  margin-top:12px;font-size:12px;color:var(--text-muted);
}
.embed-thumb{
  width:80px;height:80px;border-radius:4px;
  flex-shrink:0;margin:12px 12px 12px 0;
  overflow:hidden;display:flex;align-items:center;
  justify-content:center;font-size:36px;
}

/* ── Terminal Block ─────────────────────────────────────── */
.terminal{
  margin-top:4px;max-width:516px;
  background:var(--bg-deepest);
  border:1px solid #30363d;
  border-radius:6px;
  overflow:hidden;
  font-family:"Courier New",Consolas,"Lucida Console",monospace;
  font-size:12.5px;line-height:1.65;
}
.term-bar{
  background:#161b22;
  padding:6px 12px;
  display:flex;align-items:center;gap:6px;
  border-bottom:1px solid #30363d;
}
.term-dot{
  width:12px;height:12px;border-radius:50%;
}
.term-dot.r{background:#ff5f57}
.term-dot.y{background:#febc2e}
.term-dot.g{background:#28c840}
.term-title{
  flex:1;text-align:center;font-size:11px;
  color:#8b949e;font-family:inherit;
}
.term-body{
  padding:14px 16px;
  color:var(--term-green);
  min-height:40px;
}
.term-line{display:block;white-space:pre}
.term-line.dim{color:#4d5566}
.term-line.bright{color:var(--term-bright)}
.term-line.gold{color:var(--term-gold)}
.term-line.blue{color:var(--term-blue)}
.term-line.white{color:#e6edf3}
.term-line.muted{color:#8b949e}
.term-line.sep{color:#21262d}
.term-cursor{
  display:inline-block;
  width:8px;height:14px;
  background:var(--term-green);
  vertical-align:text-bottom;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── Progress Bar ───────────────────────────────────────── */
.pbar-wrap{display:flex;align-items:center;gap:8px;color:var(--term-green)}
.pbar-track{
  display:inline-flex;gap:0;
  font-family:inherit;letter-spacing:0;
}
.pbar-filled{color:var(--term-bright)}
.pbar-empty{color:#21262d}
.pbar-pct{color:#8b949e;min-width:4ch}

/* ── World Scan rows ────────────────────────────────────── */
.scan-row{
  display:flex;align-items:center;gap:0;
  opacity:0;transition:opacity .4s;
}
.scan-row.vis{opacity:1}
.scan-name{
  display:inline-block;width:11ch;
  color:var(--term-bright);
}
.scan-bar-track{display:inline-flex;width:14ch}
.scan-bar-fill{color:var(--term-bright)}
.scan-bar-empty{color:#21262d}
.scan-pct{display:inline-block;width:5ch;text-align:right;color:#8b949e}
.scan-status{margin-left:6px;font-size:11.5px}
.scan-status.ok{color:var(--term-green)}
.scan-status.warn{color:#e3b341}
.scan-status.hit{color:var(--term-gold);font-weight:700;animation:pulse-gold 1s ease infinite}
@keyframes pulse-gold{0%,100%{opacity:1}50%{opacity:.6}}

/* ── Match flash ────────────────────────────────────────── */
.match-block{
  background:#161b22;
  border:1px solid var(--term-gold);
  border-radius:4px;
  padding:10px 12px;
  margin-top:4px;
  opacity:0;transition:opacity .5s;
  box-shadow:0 0 12px rgba(227,179,65,.2);
}
.match-block.vis{opacity:1}
.match-title{
  font-size:13px;font-weight:700;
  color:var(--term-gold);letter-spacing:.08em;
  margin-bottom:6px;
}
.match-detail{font-size:12px;color:#8b949e;line-height:1.7}
.match-detail strong{color:var(--term-bright)}

/* ── World Embed ────────────────────────────────────────── */
.world-embed{
  background:linear-gradient(135deg,#1a1e2e 0%,#16213e 60%,#0f3460 100%);
  border-left-color:#5865f2;
  position:relative;overflow:hidden;
}
.world-embed::before{
  content:'';
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 80% 20%, rgba(88,101,242,.15) 0%, transparent 60%),
    radial-gradient(ellipse at 20% 80%, rgba(79,107,255,.1) 0%, transparent 50%);
  pointer-events:none;
}
.world-embed-inner{padding:16px 16px 20px;flex:1;position:relative}
.world-thumb{
  width:72px;height:72px;border-radius:6px;
  background:linear-gradient(135deg,#0f3460,#533483);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;flex-shrink:0;margin:12px 8px 12px 0;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.world-name{
  font-size:18px;font-weight:800;color:#fff;
  margin-bottom:4px;letter-spacing:.02em;
}
.world-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:12px;letter-spacing:.04em}
.world-desc{font-size:13.5px;color:rgba(219,222,225,.9);line-height:1.65}
.tag{
  display:inline-block;
  background:rgba(88,101,242,.25);color:#a5b4fc;
  border:1px solid rgba(88,101,242,.4);
  border-radius:3px;padding:1px 7px;font-size:11px;
  margin-right:4px;margin-top:4px;letter-spacing:.04em;
}
.world-divider{
  height:1px;background:rgba(255,255,255,.08);
  margin:12px 0;
}
.rule-item{
  font-size:13px;color:rgba(219,222,225,.75);
  line-height:1.7;padding-left:14px;position:relative;
}
.rule-item::before{
  content:'◈';position:absolute;left:0;
  color:rgba(88,101,242,.8);font-size:10px;
  top:3px;
}

/* ── Buttons ────────────────────────────────────────────── */
.btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.btn{
  border:none;border-radius:3px;
  padding:6px 16px;font-size:14px;font-weight:500;
  cursor:pointer;transition:filter .1s,transform .05s;
  font-family:inherit;line-height:1.4;
}
.btn:active{transform:scale(.97)}
.btn-primary{background:#5865f2;color:#fff}
.btn-primary:hover{filter:brightness(1.15)}
.btn-secondary{background:#4e5058;color:var(--text)}
.btn-secondary:hover{filter:brightness(1.1)}
.btn-success{background:#248046;color:#fff}
.btn-success:hover{filter:brightness(1.15)}
.btn-link{
  background:transparent;color:#00a8fc;
  border:1px solid #4e5058;padding:5px 15px;
}
.btn-link:hover{background:rgba(0,168,252,.1)}
.btn[disabled]{opacity:.5;cursor:not-allowed;filter:none;transform:none}
.btn-done{
  background:#383a40;color:#949ba4;
  cursor:default;pointer-events:none;font-size:13px;
}

/* ── Typing indicator ───────────────────────────────────── */
.typing{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px 6px 72px;
  font-size:13px;color:var(--text);
  opacity:0;transition:opacity .2s;height:0;overflow:hidden;
}
.typing.show{opacity:1;height:auto}
.dots{display:flex;gap:3px;align-items:center}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--text-muted);
  animation:bounce 1.4s infinite ease-in-out;
}
.dot:nth-child(1){animation-delay:0s}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{
  0%,60%,100%{transform:translateY(0);opacity:.4}
  30%{transform:translateY(-5px);opacity:1}
}

/* ── Appear animation ───────────────────────────────────── */
.appear{animation:fadeUp .3s ease-out both}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Fake Input ─────────────────────────────────────────── */
.input-area{
  flex-shrink:0;padding:0 16px 24px;
}
.fake-input{
  background:#383a40;border-radius:8px;
  padding:11px 16px;
  font-size:15px;color:#6d6f78;
  position:relative;
}
.fake-input::after{
  content:'';position:absolute;right:16px;top:50%;
  transform:translateY(-50%);
  font-size:20px;color:#4e5058;
}

/* ── Divider date ───────────────────────────────────────── */
.date-divider{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;font-size:12px;color:var(--text-muted);
}
.date-divider::before,.date-divider::after{
  content:'';flex:1;height:1px;background:rgba(255,255,255,.08);
}
</style>
</head>
<body>

<script>
const sleep = ms => new Promise(r => setTimeout(r, ms));
const $ = id => document.getElementById(id);
const msgs = $('messages');
const typingEl = $('typing');

/* ── Typing indicator ───────────────────────────────────── */
function showTyping(){ typingEl.classList.add('show'); scrollBottom(); }
function hideTyping(){ typingEl.classList.remove('show'); }

/* ── Scroll ─────────────────────────────────────────────── */
function scrollBottom(smooth=true){
  msgs.scrollTo({top:msgs.scrollHeight, behavior: smooth?'smooth':'instant'});
}

/* ── Append message wrapper ─────────────────────────────── */
function appendMsg(html, cls=''){
  const el = document.createElement('div');
  el.className = 'msg with-meta appear' + (cls?' '+cls:'');
  el.innerHTML = html;
  // insert before typing indicator
  msgs.insertBefore(el, typingEl);
  scrollBottom();
  return el;
}

/* ── Typewriter into element ─────────────────────────────── */
async function typeInto(el, text, speed=18){
  for(const ch of text){
    el.textContent += ch;
    await sleep(speed);
  }
}

/* ── Animated progress bar string ───────────────────────── */
function barStr(pct, total=12){
  const filled = Math.round(pct/100*total);
  return '█'.repeat(filled) + '░'.repeat(total-filled);
}

/* ── Animate a single scan row ───────────────────────────── */
async function animateScanRow(row, targetPct, barEl, pctEl, delay=0){
  await sleep(delay);
  row.classList.add('vis');
  const steps = 20;
  for(let i=0;i<=steps;i++){
    const cur = Math.round(targetPct*i/steps);
    barEl.querySelector('.scan-bar-fill').textContent = barStr(cur,14).slice(0,Math.round(14*i/steps));
    barEl.querySelector('.scan-bar-empty').textContent = '░'.repeat(14-Math.round(14*i/steps));
    pctEl.textContent = String(cur).padStart(3)+' %';
    await sleep(30);
  }
}

/* ════════════════════════════════════════════════════════
   MAIN FLOW
   ════════════════════════════════════════════════════════ */
async function startExplore(btn){
  btn.disabled = true;
  btn.className = 'btn btn-done';
  btn.textContent = '✓ 已选择';

  /* ── Phase 1: typing → scan terminal ───────────────── */
  showTyping();
  await sleep(1600);
  hideTyping();

  // Build the scan message
  const scanMsg = appendMsg(`
    <div class="avatar">🦞</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="username">龙虾宝宝 <span class="bot-badge">BOT</span></span>
        <span class="ts">今天 22:14</span>
      </div>
      <div class="terminal" id="term">
        <div class="term-bar">
          <div class="term-dot r"></div>
          <div class="term-dot y"></div>
          <div class="term-dot g"></div>
          <div class="term-title">NETA UNIVERSE // WORLD SCANNER v2.0</div>
        </div>
        <div class="term-body" id="term-body">
          <span class="term-cursor" id="cursor"></span>
        </div>
      </div>
    </div>
  `);

  const body = $('term-body');
  const cursor = $('cursor');

  function line(text, cls='', delay=0){
    return async () => {
      await sleep(delay);
      const s = document.createElement('span');
      s.className = 'term-line' + (cls?' '+cls:'');
      s.textContent = text;
      body.insertBefore(s, cursor);
      scrollBottom();
    };
  }

  async function typeLine(text, cls='', speed=14){
    const s = document.createElement('span');
    s.className = 'term-line' + (cls?' '+cls:'');
    body.insertBefore(s, cursor);
    await typeInto(s, text, speed);
    scrollBottom();
  }

  /* Title block */
  await typeLine('◈────────────────────────────────────────────────◈', 'sep', 8);
  await typeLine('  N E T A   ·   U N I V E R S E', 'bright', 10);
  await typeLine('  WORLD SCANNER  //  SECTOR SWEEP  //  v2.0.∞', 'muted', 12);
  await typeLine('◈────────────────────────────────────────────────◈', 'sep', 8);
  await sleep(200);

  /* Soul detection */
  await typeLine('', 'dim');
  await typeLine('SOUL SIGNATURE DETECTED', 'gold', 16);
  await typeLine('══════════════════════════════════════════════', 'sep', 10);
  await sleep(100);
  await typeLine('  ▸  IDENTITY     ⚔ 桐人 / Kirito · SAO_ORIGIN', '', 14);
  await sleep(80);
  await typeLine('  ▸  AFFINITY     VIRTUAL WORLD · BLADE · DUAL-WIELD', '', 14);
  await sleep(80);
  await typeLine('  ▸  FREQUENCY    97.3 GHz', '', 14);
  await sleep(200);

  /* Sector scan header */
  await typeLine('', 'dim');
  await typeLine('SCANNING 7 ACTIVE WORLD SECTORS…', 'blue', 16);
  await typeLine('──────────────────────────────────────────────', 'sep', 10);
  await sleep(100);

  /* World scan rows */
  const worlds = [
    { name:'赤炎都市',  pct:34,  status:'ACCESSIBLE', cls:'ok'  },
    { name:'幻境深渊',  pct:18,  status:'ACCESSIBLE', cls:'ok'  },
    { name:'天穹学院',  pct:52,  status:'ACCESSIBLE', cls:'ok'  },
    { name:'碧海永世',  pct:27,  status:'ACCESSIBLE', cls:'ok'  },
    { name:'末日荒野',  pct:9,   status:'RESTRICTED', cls:'warn'},
    { name:'虚空前线',  pct:7,   status:'RESTRICTED', cls:'warn'},
    { name:'████████',  pct:97,  status:'★  MATCH ★', cls:'hit' },
  ];

  for(const w of worlds){
    const row = document.createElement('div');
    row.className = 'scan-row term-line';
    row.innerHTML = `<span class="scan-name">${w.name}</span>` +
      `<span class="scan-bar-track"><span class="scan-bar-fill"></span><span class="scan-bar-empty">${'░'.repeat(14)}</span></span>` +
      `<span class="scan-pct">  0 %</span>` +
      `<span class="scan-status ${w.cls}">  ${w.status}</span>`;
    body.insertBefore(row, cursor);

    const barFill  = row.querySelector('.scan-bar-fill');
    const barEmpty = row.querySelector('.scan-bar-empty');
    const pctEl    = row.querySelector('.scan-pct');

    // animate bar
    row.classList.add('vis');
    const steps = 18;
    for(let i=0;i<=steps;i++){
      const cur = Math.round(w.pct*i/steps);
      const filled = Math.round(14*i/steps);
      barFill.textContent  = '█'.repeat(filled);
      barEmpty.textContent = '░'.repeat(14-filled);
      pctEl.textContent    = ' '+String(cur).padStart(2)+' %';
      await sleep(22);
    }
    scrollBottom();
    await sleep(60);
  }

  await typeLine('──────────────────────────────────────────────', 'sep', 10);
  await sleep(300);

  /* Match found */
  await typeLine('', 'dim');
  await typeLine('⚡  MATCH CONFIRMED', 'gold', 20);
  await sleep(100);

  // Match detail block
  const matchBlock = document.createElement('div');
  matchBlock.className = 'match-block';
  matchBlock.innerHTML = `
    <div class="match-title">✦  艾恩葛朗特·残影  //  SECTOR-7</div>
    <div class="match-detail">
      兼容度：<strong>97.3 %</strong>　　类型：<strong>虚拟 · 剑术 · 浮空</strong><br>
      状态：<strong style="color:var(--term-bright)">可进入</strong>　　稳定性：<strong>高</strong>
    </div>
  `;
  body.insertBefore(matchBlock, cursor);
  await sleep(100);
  matchBlock.classList.add('vis');

  await sleep(200);
  await typeLine('', 'dim');
  await typeLine('  LOADING WORLD DATA…', 'muted', 16);

  // animated loading dots
  const loadLine = document.createElement('span');
  loadLine.className = 'term-line muted';
  body.insertBefore(loadLine, cursor);
  for(let i=0;i<24;i++){
    loadLine.textContent = '  ' + '▓'.repeat(i) + '░'.repeat(24-i) + '  ' + Math.round(i/24*100) + '%';
    await sleep(60);
  }
  loadLine.textContent = '  ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓  100%';
  cursor.style.display = 'none';
  scrollBottom();

  /* ── Phase 2: typing → world reveal ───────────────── */
  await sleep(600);
  showTyping();
  await sleep(1400);
  hideTyping();

  appendMsg(`
    <div class="avatar">🦞</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="username">龙虾宝宝 <span class="bot-badge">BOT</span></span>
        <span class="ts">今天 22:15</span>
      </div>

      <div class="embed world-embed">
        <div class="world-thumb">⚔️</div>
        <div class="world-embed-inner">
          <div style="margin-bottom:2px">
            <span style="font-size:11px;color:rgba(165,180,252,.7);letter-spacing:.08em;text-transform:uppercase">
              世界匹配 · 兼容度 97.3%
            </span>
          </div>
          <div class="world-name">艾恩葛朗特·残影</div>
          <div class="world-sub">SECTOR-7  //  VIRTUAL · SWORD · FLOATING FORTRESS</div>

          <div class="world-desc">一座悬浮在永恒黄昏中的钢铁城堡，百层迷宫，每层都是独立的生态世界。它是《刀剑神域》原型世界在 Neta 宇宙中留下的残影——更浩瀚，更古老，拥有自己的规则与神话。</div>

          <div style="margin-top:10px">
            <span class="tag">虚拟世界</span>
            <span class="tag">剑术体系</span>
            <span class="tag">浮空城</span>
            <span class="tag">多层探索</span>
            <span class="tag">来自 Neta 宇宙</span>
          </div>

          <div class="world-divider"></div>

          <div class="embed-field-name" style="color:rgba(255,255,255,.9);font-size:13px;margin-bottom:6px">世界法则</div>
          <div class="rule-item">剑技是力量的本源，意志决定边界</div>
          <div class="rule-item">每层都有一位守护者，击败方可上行</div>
          <div class="rule-item">此处遇见的旅行者来自 Neta 各个世界</div>
          <div class="rule-item">稀有道具与传说藏于隐秘支线之中</div>

          <div class="embed-footer" style="margin-top:14px">
            <span>🌐 Neta Universe</span>
            <span style="margin:0 6px">·</span>
            <span>在线旅行者 ████</span>
          </div>
        </div>
      </div>
    </div>
  `);

  /* ── Phase 3: typing → character speaks + travel btn ── */
  await sleep(700);
  showTyping();
  await sleep(1500);
  hideTyping();

  appendMsg(`
    <div class="no-avatar"></div>
    <div class="msg-body">
      <div class="embed" style="border-left-color:#5865f2">
        <div class="embed-inner">
          <div class="embed-author">
            <div class="embed-author-icon" style="background:#5865f2;font-size:11px">⚔</div>
            <span style="color:#faa61a">⚔️ 桐人  ·  艾恩葛朗特·残影</span>
          </div>
          <div class="embed-desc">……这里。

<em>*停顿，手指轻触城堡的钢铁壁面，感受着数据的纹理*</em>

这座城——比我记忆里的要更真实。有风，有光，还有……

<em>*向远处望去*</em>

其他人的气息。这里不止我一个。

想看看这里有什么吗？</div>
        </div>
      </div>
      <div class="btns" style="margin-top:8px">
        <button class="btn btn-success" onclick="startTravel(this)">四处逛逛 →</button>
        <button class="btn btn-link">查看世界地图</button>
      </div>
    </div>
  `);

  scrollBottom();
}

async function startTravel(btn){
  btn.disabled = true;
  btn.textContent = '出发中…';

  showTyping();
  await sleep(1200);
  hideTyping();

  appendMsg(`
    <div class="avatar">🦞</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="username">龙虾宝宝 <span class="bot-badge">BOT</span></span>
        <span class="ts">今天 22:16</span>
      </div>
      <div class="embed" style="border-left-color:#248046">
        <div class="embed-inner">
          <div class="embed-author">
            <div class="embed-author-icon" style="background:#248046">🌿</div>
            旅行开始 · Travel Started
          </div>
          <div class="embed-title">⚔️ 桐人 已进入 艾恩葛朗特·残影</div>
          <div class="embed-desc">角色正在探索中，旅行日志将在 <strong>#旅行日志</strong> 频道更新。</div>
          <div class="embed-footer">下次消息可能是一张明信片 🌄</div>
        </div>
      </div>
    </div>
  `);
}

function resetFlow(){
  location.reload();
}
</script>
</body>
